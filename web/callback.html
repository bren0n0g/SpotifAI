<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Autenticação SpotifAI</title>
</head>
<body>
  <p>Conectado! Retornando ao SpotifAI...</p>
  <script>
    const message = { 'flutter-web-auth-2': window.location.href };
    const targetOrigin = "https://spotifai.brenomachado2003.workers.dev";

    // 1. Tenta mandar direto para a aba mãe (Plano A)
    if (window.opener) {
      window.opener.postMessage(message, targetOrigin);
      // Dá um tempinho para a mensagem chegar antes de fechar
      setTimeout(() => window.close(), 100);
    } else {
      // 2. Se o "cordão umbilical" quebrou, usa a memória local (Plano B)
      localStorage.setItem('flutter-web-auth-2', window.location.href);
      window.close();
    }
  </script>
</body>
</html>
